<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ValSkinCare - Catálogo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <nav class="navbar bg-white fixed-top shadow-sm">
        <div class="container">
            <a class="navbar-brand mx-auto" href="#">
                <img src="img/Logotipo.png" height="120" alt="Logo ValSkinCare">
            </a>
        </div>
    </nav>

    <div class="container mt-5 pt-5">

        <h1 class="text-center mb-4 titulo">Galería ValSkinCare</h1>

        <!-- ⭐ CARRUSEL 1 (IMÁGENES 1–5) ⭐ -->
        <div id="c1" class="carousel slide mb-5" data-bs-ride="carousel">
            <div class="carousel-inner">

                <div class="carousel-item active">
                    <img src="img/1.jpg" class="d-block w-100">
                </div>
                <div class="carousel-item">
                    <img src="img/2.jpg" class="d-block w-100">
                </div>
                <div class="carousel-item">
                    <img src="img/3.jpg" class="d-block w-100">
                </div>
                <div class="carousel-item">
                    <img src="img/4.jpg" class="d-block w-100">
                </div>
                <div class="carousel-item">
                    <img src="img/5.jpg" class="d-block w-100">
                </div>

            </div>

            <button class="carousel-control-prev" type="button" data-bs-target="#c1" data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#c1" data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
            </button>
        </div>

        <!-- ⭐ CARRUSEL 2 (IMÁGENES 6–10) ⭐ -->
        <div id="c2" class="carousel slide mb-5" data-bs-ride="carousel">
            <div class="carousel-inner">

                <div class="carousel-item active"><img src="img/6.jpg" class="d-block w-100"></div>
                <div class="carousel-item"><img src="img/7.jpg" class="d-block w-100"></div>
                <div class="carousel-item"><img src="img/8.jpg" class="d-block w-100"></div>
                <div class="carousel-item"><img src="img/9.jpg" class="d-block w-100"></div>
                <div class="carousel-item"><img src="img/10.jpg" class="d-block w-100"></div>

            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#c2" data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#c2" data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
            </button>
        </div>


        <!-- ⭐ CARRUSEL 3 (IMÁGENES 11–15) ⭐ -->
        <div id="c3" class="carousel slide mb-5" data-bs-ride="carousel">
            <div class="carousel-inner">
                <div class="carousel-item active"><img src="img/11.jpg" class="d-block w-100"></div>
                <div class="carousel-item"><img src="img/12.jpg" class="d-block w-100"></div>
                <div class="carousel-item"><img src="img/13.jpg" class="d-block w-100"></div>
                <div class="carousel-item"><img src="img/14.jpg" class="d-block w-100"></div>
                <div class="carousel-item"><img src="img/15.jpg" class="d-block w-100"></div>
            </div>

            <button class="carousel-control-prev" type="button" data-bs-target="#c3" data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#c3" data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
            </button>
        </div>


        <!-- ⭐ CARRUSEL 4 (IMÁGENES 16–20) ⭐ -->
        <div id="c4" class="carousel slide mb-5" data-bs-ride="carousel">
            <div class="carousel-inner">
                <div class="carousel-item active"><img src="img/16.jpg" class="d-block w-100"></div>
                <div class="carousel-item"><img src="img/17.jpg" class="d-block w-100"></div>
                <div class="carousel-item"><img src="img/18.jpg" class="d-block w-100"></div>
                <div class="carousel-item"><img src="img/19.jpg" class="d-block w-100"></div>
                <div class="carousel-item"><img src="img/20.jpg" class="d-block w-100"></div>
            </div>

            <button class="carousel-control-prev" type="button" data-bs-target="#c4" data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#c4" data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
            </button>
        </div>


        <!-- ⭐ CARRUSEL 5 (IMÁGENES 21–25) ⭐ -->
        <div id="c5" class="carousel slide mb-5" data-bs-ride="carousel">
            <div class="carousel-inner">

                <div class="carousel-item"><img src="img/22.jpg" class="d-block w-100"></div>
                <div class="carousel-item"><img src="img/23.jpg" class="d-block w-100"></div>
                <div class="carousel-item"><img src="img/24.jpg" class="d-block w-100"></div>
                <div class="carousel-item"><img src="img/25.jpg" class="d-block w-100"></div>
            </div>

            <button class="carousel-control-prev" type="button" data-bs-target="#c5" data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#c5" data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
            </button>
        </div>


        <!-- ⭐ CARRUSEL 6 (IMÁGENES 26–29) ⭐ -->
        <div id="c6" class="carousel slide mb-5" data-bs-ride="carousel">
            <div class="carousel-inner">
                <div class="carousel-item active"><img src="img/26.jpg" class="d-block w-100"></div>
                <div class="carousel-item"><img src="img/27.jpg" class="d-block w-100"></div>
                <div class="carousel-item"><img src="img/28.jpg" class="d-block w-100"></div>
                <div class="carousel-item"><img src="img/29.jpg" class="d-block w-100"></div>
            </div>

            <button class="carousel-control-prev" type="button" data-bs-target="#c6" data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#c6" data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
            </button>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
