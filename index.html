<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ValSkinCare - Catálogo</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- LOGO FIJO -->
    <header class="header">
        <img src="img/logo.png" alt="ValSkinCare Logo" class="logo">
    </header>

    <!-- CONTENIDO (DEBAJO DEL LOGO) -->
    <main class="contenido">

        <h1 class="titulo">Catálogo ValSkinCare</h1>

        <div class="grid-productos">

            <!-- 🔵 PRODUCTO 1 -->
            <div class="producto">
                <img src="img/p1.jpg" alt="Producto 1">
                <h3>Nombre del producto 1</h3>
                <p class="descripcion">Descripción breve del producto.</p>
                <p class="precio">$0.00 MXN</p>
                <p class="disponible">Disponible</p>
            </div>

            <!-- 🔵 PRODUCTO 2 -->
            <div class="producto">
                <img src="img/p2.jpg" alt="Producto 2">
                <h3>Nombre del producto 2</h3>
                <p class="descripcion">Descripción breve del producto.</p>
                <p class="precio">$0.00 MXN</p>
                <p class="disponible">Disponible</p>
            </div>

            <!-- ✔ SOLO COPIA-PEGA ESTA ESTRUCTURA HASTA EL PRODUCTO 29 -->
            <!-- 🔵 PRODUCTOS RESTANTES (3 AL 29) -->
            <!-- Solo duplica la caja y cambia la info e imagen -->
            <!-- Ejemplo: -->
            <div class="producto">
                <img src="img/p3.jpg" alt="Producto 3">
                <h3>Nombre del producto 3</h3>
                <p class="descripcion">Descripción breve del producto.</p>
                <p class="precio">$0.00 MXN</p>
                <p class="disponible">Agotado</p>
            </div>

            <!-- … sigue copiando hasta llegar a 29 productos -->

        </div>

    </main>

</body>
</html>
