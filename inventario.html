<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario - ValSkinCare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            padding: 20px;
            background: #fff0fa;
        }

        .filtros {
            background: white;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #ddd;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

    <h1 class="text-center mb-4">Inventario de Productos</h1>

    <!-- FILTROS -->
    <div class="container filtros">
        <div class="row">
            <div class="col-md-6">
                <label class="fw-bold">Ordenar por nombre:</label>
                <select id="ordenNombre" class="form-select" onchange="aplicarFiltros()">
                    <option value="normal">Normal</option>
                    <option value="asc">A - Z</option>
                    <option value="desc">Z - A</option>
                </select>
            </div>

            <div class="col-md-6">
                <label class="fw-bold">Ordenar por cantidad:</label>
                <select id="ordenCantidad" class="form-select" onchange="aplicarFiltros()">
                    <option value="normal">Normal</option>
                    <option value="asc">Menor a Mayor</option>
                    <option value="desc">Mayor a Menor</option>
                </select>
            </div>
        </div>
    </div>

    <div class="container">
        <table class="table table-bordered table-striped" id="tablaInventario">
            <thead class="table-dark">
                <tr>
                    <th>Producto</th>
                    <th>Cantidad</th>
                    <th>Actualizar</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        let inventarioOriginal = [];
        let inventarioActual = [];

        async function cargarInventario() {

            //---------------------------------------------
            // 1. Cargar inventario.json
            //---------------------------------------------
            const res = await fetch("inventario.json");
            const data = await res.json();

            // Si NO hay localStorage, se inicializa
            if (!localStorage.getItem("invValSkin")) {
                localStorage.setItem("invValSkin", JSON.stringify(data));
            }

            // Datos provenientes de localStorage
            inventarioOriginal = JSON.parse(localStorage.getItem("invValSkin"));

            // Copia para ordenar
            inventarioActual = [...inventarioOriginal];

            mostrarTabla();
        }

        //-------------------------------------------------
        // Mostrar los productos en la tabla
        //-------------------------------------------------
        function mostrarTabla() {
            const tbody = document.querySelector("#tablaInventario tbody");
            tbody.innerHTML = "";

            inventarioActual.forEach(prod => {
                tbody.innerHTML += `
                <tr>
                    <td>${prod.nombre}</td>
                    <td>
                        <input type="number" class="form-control"
                            value="${prod.cantidad}" min="0" id="p${prod.id}">
                    </td>
                    <td>
                        <button class="btn btn-primary" onclick="guardar(${prod.id})">Guardar</button>
                    </td>
                </tr>
                `;
            });
        }

        //-------------------------------------------------
        // Guardar cambios en localStorage
        //-------------------------------------------------
        function guardar(id) {

            const nuevaCantidad = Number(document.querySelector(`#p${id}`).value);

            // Evitar negativos
            if (nuevaCantidad < 0) return;

            // Buscar producto
            const idx = inventarioOriginal.findIndex(p => p.id === id);

            inventarioOriginal[idx].cantidad = nuevaCantidad;

            // Guardar en localStorage
            localStorage.setItem("invValSkin", JSON.stringify(inventarioOriginal));

            alert("Inventario actualizado.");
        }

        //-------------------------------------------------
        // Aplicar filtros de ordenamiento
        //-------------------------------------------------
        function aplicarFiltros() {
            const ordenNombre = document.getElementById("ordenNombre").value;
            const ordenCantidad = document.getElementById("ordenCantidad").value;

            // Restaurar orden original
            inventarioActual = [...inventarioOriginal];

            // Orden por nombre
            if (ordenNombre === "asc") {
                inventarioActual.sort((a, b) => a.nombre.localeCompare(b.nombre));
            } else if (ordenNombre === "desc") {
                inventarioActual.sort((a, b) => b.nombre.localeCompare(a.nombre));
            }

            // Orden por cantidad
            if (ordenCantidad === "asc") {
                inventarioActual.sort((a, b) => a.cantidad - b.cantidad);
            } else if (ordenCantidad === "desc") {
                inventarioActual.sort((a, b) => b.cantidad - a.cantidad);
            }

            mostrarTabla();
        }

        cargarInventario();
    </script>

</body>

</html>
