<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario - ValSkinCare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            opacity: 1;
        }

        .btn-adjust {
            width: 35px;
            height: 35px;
            padding: 0;
            font-size: 20px;
        }
    </style>
</head>

<body class="p-4">

    <h1 class="text-center mb-4">Inventario de Productos</h1>

    <div class="container">
        <table class="table table-bordered table-striped" id="tablaInventario">
            <thead class="table-dark">
                <tr>
                    <th>Producto</th>
                    <th style="width:150px;">Cantidad</th>
                    <th style="width:130px;">Ajustar</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        // 🔥 Lista de tus 29 productos (extraídos del catálogo)
        const productos = [
            "Neoretin (3 ml)",
            "Woman Isdin 6 ml",
            "La Roche - Posay 3 ml",
            "Vichy 3 ml",
            "A - Derma 5 ml",
            "La Roche - Posay 2 ml",
            "Bioderma 4 ml",
            "La Roche - Posay 2 ml",
            "Bioderma 5 ml",
            "Endocare 3 ml",
            "La Roche - Posay 3 ml",
            "Biretix 5 ml",
            "La Roche - Posay 15 ml",

            "Bioderma (8 ml)",
            "La Roche - Posay (15 ml)",
            "Cetaphil 29 ml",
            "Vichy 5 ml",
            "La Roche - Posay 15 ml",

            "Heliocare 360° (3ml)",
            "Heliocare 360° (5 ml)",
            "Heliocare 360° (3 ml)",
            "La Roche - Posay 3 ml",
            "La Roche - Posay",
            "Vichy 3 ml",
            "Isdin 2 ml",

            "Eucerin (7 ml)",
            "Dercos Technique (6 ml)",
            "Bioderma 4 ml",
            "Bioderma 8 ml"
        ];

        // 🔥 Cargar inventario desde localStorage o crear uno nuevo
        function cargarInventario() {
            let data = JSON.parse(localStorage.getItem("inventario"));

            // Si no existe, crear inventario inicial
            if (!data) {
                data = productos.map((nombre, index) => ({
                    id: index + 1,
                    nombre,
                    cantidad: 0
                }));
                localStorage.setItem("inventario", JSON.stringify(data));
            }

            const tbody = document.querySelector("#tablaInventario tbody");
            tbody.innerHTML = "";

            data.forEach(prod => {
                tbody.innerHTML += `
                <tr>
                    <td>${prod.nombre}</td>

                    <td>
                        <input type="number" class="form-control text-center" 
                               id="p${prod.id}" 
                               value="${prod.cantidad}" 
                               min="0" 
                               onchange="actualizarCantidad(${prod.id})">
                    </td>

                    <td class="text-center">
                        <button class="btn btn-success btn-adjust" onclick="ajustar(${prod.id}, 1)">▲</button>
                        <button class="btn btn-danger btn-adjust" onclick="ajustar(${prod.id}, -1)">▼</button>
                    </td>
                </tr>
                `;
            });
        }

        // 🔥 Ajustar cantidad con botones ▲ ▼
        function ajustar(id, cambio) {
            let data = JSON.parse(localStorage.getItem("inventario"));
            const prod = data.find(p => p.id === id);

            prod.cantidad += cambio;
            if (prod.cantidad < 0) prod.cantidad = 0;

            localStorage.setItem("inventario", JSON.stringify(data));
            document.querySelector(`#p${id}`).value = prod.cantidad;
        }

        // 🔥 Actualizar manualmente desde input
        function actualizarCantidad(id) {
            let data = JSON.parse(localStorage.getItem("inventario"));
            const prod = data.find(p => p.id === id);

            let valor = Number(document.querySelector(`#p${id}`).value);
            if (valor < 0) valor = 0;

            prod.cantidad = valor;

            localStorage.setItem("inventario", JSON.stringify(data));
        }

        cargarInventario();
    </script>

</body>

</html>
