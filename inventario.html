<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario - ValSkinCare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            padding: 20px;
            background: #fff0fa;
        }

        .filtros {
            background: white;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #ddd;
            margin-bottom: 20px;
        }

        .btn-guardar {
            margin-top: 20px;
            width: 100%;
        }
    </style>
</head>

<body>

    <h1 class="text-center mb-4">Inventario de Productos</h1>

    <!-- FILTROS -->
    <div class="container filtros">
        <div class="row">
            <div class="col-md-6">
                <label class="fw-bold">Ordenar por nombre:</label>
                <select id="ordenNombre" class="form-select" onchange="aplicarFiltros()">
                    <option value="normal">Normal</option>
                    <option value="asc">A - Z</option>
                    <option value="desc">Z - A</option>
                </select>
            </div>

            <div class="col-md-6">
                <label class="fw-bold">Ordenar por cantidad:</label>
                <select id="ordenCantidad" class="form-select" onchange="aplicarFiltros()">
                    <option value="normal">Normal</option>
                    <option value="asc">Menor a Mayor</option>
                    <option value="desc">Mayor a Menor</option>
                </select>
            </div>
        </div>
    </div>

    <div class="container">

        <table class="table table-bordered table-striped" id="tablaInventario">
            <thead class="table-dark">
                <tr>
                    <th>Producto</th>
                    <th>Cantidad</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>


    <script>
        let inventarioOriginal = [];
        let inventarioActual = [];

        //---------------------------------------------
        // CARGAR INVENTARIO DESDE JSON SIN CACHE
        //---------------------------------------------
        async function obtenerInventario() {
            const res = await fetch("inventario.json?v=" + Date.now());
            return await res.json();
        }

        //---------------------------------------------
        // CARGAR Y MOSTRAR INVENTARIO
        //---------------------------------------------
        async function cargarInventario() {
            inventarioOriginal = await obtenerInventario();
            inventarioActual = [...inventarioOriginal];
            mostrarTabla();
        }

        //---------------------------------------------
        // MOSTRAR TABLA (crear elementos)
        //---------------------------------------------
        function mostrarTabla() {
            const tbody = document.querySelector("#tablaInventario tbody");
            tbody.innerHTML = "";

            inventarioActual.forEach(prod => {
                const tr = document.createElement("tr");

                const tdNombre = document.createElement("td");
                tdNombre.textContent = prod.nombre;

                const tdCantidad = document.createElement("td");
                const input = document.createElement("input");
                input.type = "number";
                input.className = "form-control cantidad-input";
                input.min = 0;
                input.value = prod.cantidad;
                input.dataset.id = prod.id;

                tdCantidad.appendChild(input);

                tr.appendChild(tdNombre);
                tr.appendChild(tdCantidad);
                tbody.appendChild(tr);
            });
        }

        //---------------------------------------------
        // AVISO DE QUE NO SE PUEDE GUARDAR
        //---------------------------------------------
        function alertaGuardar() {
            alert("GitHub Pages NO permite guardar.\n\nPara modificar cantidades edita inventario.json directamente en GitHub.");
        }

        //---------------------------------------------
        // APLICAR FILTROS
        //---------------------------------------------
        function aplicarFiltros() {
            const ordenNombre = document.getElementById("ordenNombre").value;
            const ordenCantidad = document.getElementById("ordenCantidad").value;

            inventarioActual = [...inventarioOriginal];

            if (ordenNombre === "asc") {
                inventarioActual.sort((a, b) => a.nombre.localeCompare(b.nombre));
            } else if (ordenNombre === "desc") {
                inventarioActual.sort((a, b) => b.nombre.localeCompare(a.nombre));
            }

            if (ordenCantidad === "asc") {
                inventarioActual.sort((a, b) => a.cantidad - b.cantidad);
            } else if (ordenCantidad === "desc") {
                inventarioActual.sort((a, b) => b.cantidad - a.cantidad);
            }

            mostrarTabla();
        }

        cargarInventario();
    </script>

</body>

</html>
