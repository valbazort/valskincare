<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario - ValSkinCare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">

    <h1 class="text-center mb-4">Inventario de Productos</h1>

    <div class="container">
        <table class="table table-bordered table-striped" id="tablaInventario">
            <thead class="table-dark">
                <tr>
                    <th>Producto</th>
                    <th>Cantidad</th>
                    <th>Actualizar</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        async function cargarInventario() {
            const res = await fetch("inventario.json");
            const data = await res.json();

            const tbody = document.querySelector("#tablaInventario tbody");
            tbody.innerHTML = "";

            data.forEach(prod => {
                tbody.innerHTML += `
                    <tr>
                        <td>${prod.nombre}</td>
                        <td>
                            <input type="number" class="form-control" value="${prod.cantidad}" min="0" id="p${prod.id}">
                        </td>
                        <td>
                            <button class="btn btn-primary" onclick="guardar(${prod.id})">Guardar</button>
                        </td>
                    </tr>
                `;
            });
        }

        async function guardar(id) {
            const res = await fetch("inventario.json");
            const data = await res.json();

            const prodIndex = data.findIndex(p => p.id === id);
            const nuevaCantidad = document.querySelector(`#p${id}`).value;

            data[prodIndex].cantidad = Number(nuevaCantidad);

            await fetch("inventario.json", {
                method: "PUT",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(data, null, 2)
            });

            alert("Inventario actualizado.");
        }

        cargarInventario();
    </script>

</body>
</html>
